# env ===========================================================================================

env=XDG_BACKEND,wayland
env=DISPLAY,:2

# autostart =====================================================================================

exec-once=xwayland-satellite :2
exec-once=pipewire
exec-once=foot --server

# keyboard ======================================================================================

repeat_rate=70
repeat_delay=160
numlockon=1
xkb_rules_layout=us

# mouse =========================================================================================

mouse_natural_scrolling=0
mouse_accel_profile=0

# focus =========================================================================================

sloppyfocus=0 # follow mouse
warpcursor=0
drag_tile_to_tile=1

# window ========================================================================================

enable_floating_snap=1
no_border_when_single=0

# dimensions ====================================================================================

borderpx=2
gappih=8
gappiv=8
gappoh=8
gappov=8

# colors ========================================================================================

rootcolor=0x1c2225ff
bordercolor=0x2b3337ff
dropcolor=0x171c1f55
focuscolor=0xcbe3b3ff
urgentcolor=0xf5d098ff

maximizescreencolor=0xcbe3b3ff
scratchpadcolor=0xd2bdf3ff
globalcolor=0xb2caedff
overlaycolor=0xb3e6dbff

# blur ==========================================================================================

blur=0
blur_optimized=1

# shadows =======================================================================================

shadows=0

# opacity & corners =============================================================================

border_radius=2
focused_opacity=1
unfocused_opacity=1

# animations ====================================================================================

animations=1
layer_animations=1

animation_type_open=slide
animation_type_close=slide
layer_animation_type_open=zoom
layer_animation_type_close=zoom

zoom_initial_ratio=0.9
zoom_end_ratio=0.9

animation_duration_move=400
animation_duration_open=300
animation_duration_tag=300
animation_duration_close=200
animation_duration_focus=0

tag_animation_direction=1 # horizontal

# layouts =======================================================================================

circle_layout=tile,vertical_scroller

new_is_master=0
default_mfact=0.5 # master-stack ratio

scroller_structs=8 # outer gap
scroller_default_proportion=0.5
scroller_proportion_preset=0.33333,0.50000,0.66667

# overview ======================================================================================

enable_hotarea=0
ov_tab_mode=0
overviewgappi=4 # inner gap / 2
overviewgappo=16 # outer gap * 2

# tags ==========================================================================================

tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:vertical_scroller
tagrule=id:3,layout_name:vertical_scroller
tagrule=id:4,layout_name:tile

# keybinds ======================================================================================

bind=super,k,spawn,footclient
bind=super,m,spawn,rofi -show drun
bind=super,comma,killclient

bind=super,h,switch_layout
bind=super,q,quit
bind=super,backslash,reload_config

bind=alt,n,focusdir,left
bind=alt,e,focusdir,down
bind=alt,i,focusdir,up
bind=alt,o,focusdir,right

bind=alt+shift,n,exchange_client,left
bind=alt+shift,e,exchange_client,down
bind=alt+shift,i,exchange_client,up
bind=alt+shift,o,exchange_client,right

bind=alt+ctrl,n,scroller_stack,left
bind=alt+ctrl,e,scroller_stack,down
bind=alt+ctrl,i,scroller_stack,up
bind=alt+ctrl,o,scroller_stack,right

bind=alt,m,togglefloating
bind=alt,comma,toggleglobal

bind=alt,k,restore_minimized
bind=alt,h,toggle_scratchpad
bind=alt,l,minimized

bind=alt+shift,y,set_proportion,1.0
bind=alt,y,set_proportion,0.5
bind=alt,u,switch_proportion_preset

bind=super,l,togglemaximizescreen
bind=super,u,togglefullscreen
bind=super,y,togglefakefullscreen

bind=alt,tab,toggleoverview

bind=super,n,viewtoleft,0
bind=super,e,viewtoright,0
bind=super,i,viewtoleft,0
bind=super,o,viewtoright,0

bind=super+shift,n,tagtoleft,0
bind=super+shift,e,tagtoright,0
bind=super+shift,i,tagtoleft,0
bind=super+shift,o,tagtoright,0

bind=super,1,view,1,0
bind=super,2,view,2,0
bind=super,3,view,3,0
bind=super,4,view,4,0

bind=super+shift,1,tag,1,0
bind=super+shift,2,tag,2,0
bind=super+shift,3,tag,3,0
bind=super+shift,4,tag,4,0

bind=super+ctrl,n,resizewin,-50,+0
bind=super+ctrl,e,resizewin,+0,+50
bind=super+ctrl,i,resizewin,+0,-50
bind=super+ctrl,o,resizewin,+50,+0

mousebind=alt,btn_left,moveresize,curmove
mousebind=alt,btn_middle,togglemaximizescreen,0
mousebind=alt,btn_right,moveresize,curresize
